name: Python CI/CD

on:
  push:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - run: pip install -r requirements.txt

      - run: pytest

      - run: pyinstaller --onefile app.py

      - uses: actions/upload-artifact@v3
        with:
          name: python-crud-executable
          path: dist/app